# Render Blueprint — connect this repo in the Render dashboard and apply the blueprint.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: vendor-plant-tracker
    runtime: node
    plan: starter
    region: ohio
    buildCommand: >-
      corepack prepare pnpm@10.4.1 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/po-system run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "24"
      - key: NODE_ENV
        value: production
      - key: BASE_PATH
        value: /
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: vendor-plant-tracker-db
          property: connectionString

databases:
  - name: vendor-plant-tracker-db
    plan: basic-256mb
    databaseName: vendor_plant_tracker
    user: vendor_plant_tracker
