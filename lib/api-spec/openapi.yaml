        billTo:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        primaryContact:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        shipTo:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, name, createdAt]

    CreateCustomerBody:
      type: object
      properties:
        customerNumber:
          type: integer
          nullable: true
        name:
          type: string
        billTo:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        primaryContact:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        shipTo:
          type: string
          nullable: true
      required: [name]

    UpdateCustomerBody:
      type: object
      properties:
        customerNumber:
          type: integer
          nullable: true
        name:
          type: string
        billTo:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        primaryContact:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        shipTo:
          type: string
          nullable: true

