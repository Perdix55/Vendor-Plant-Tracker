openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Purchase Order System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: Storage
    description: Object storage upload and serving endpoints.
  - name: health
    description: Health operations
  - name: vendors
    description: Vendor management
  - name: products
    description: Product catalog
  - name: orders
    description: Purchase orders
  - name: summary
    description: Dashboard summaries
  - name: vendorConfirm
    description: Public vendor confirmation (token-based)
  - name: settings
    description: App-wide settings
  - name: salesOrders
    description: Sales orders (customer-facing)
  - name: inventory
    description: Inventory management
  - name: customers
    description: Customer directory

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Object content streamed.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/import:
    post:
      operationId: importVendor
      tags: [vendors]
      summary: Import a new vendor with products from a spreadsheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportVendorBody"
      responses:
        "201":
          description: Imported vendor with products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportVendorResult"

  /vendors/{vendorId}/products/import:
    post:
      operationId: importVendorProducts
      tags: [vendors]
      summary: Bulk-import products for an existing vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [products]
              properties:
                products:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      packSize:
                        type: string
                        nullable: true
                      cost:
                        type: number
                        nullable: true
      responses:
        "201":
          description: Products imported
          content:
            application/json:
              schema:
                type: object
                required: [productsCreated]
                properties:
                  productsCreated:
                    type: integer
                  skipped:
                    type: integer

  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a vendor by ID
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor email or notes
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /customers:
    get:
      operationId: listCustomers
      tags: [customers]
      summary: List all customers
      responses:
        "200":
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Customer"
    post:
      operationId: createCustomer
      tags: [customers]
      summary: Create a new customer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCustomerBody"
      responses:
        "201":
          description: Created customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"

  /customers/import:
    post:
      operationId: importCustomers
      tags: [customers]
      summary: Bulk import customers from a spreadsheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportCustomersBody"
      responses:
        "201":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportCustomersResult"

  /customers/{customerId}:
    get:
      operationId: getCustomer
      tags: [customers]
      summary: Get a customer by ID
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    patch:
      operationId: updateCustomer
      tags: [customers]
      summary: Update a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCustomerBody"
      responses:
        "200":
          description: Updated customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
    delete:
      operationId: deleteCustomer
      tags: [customers]
      summary: Delete a customer
      parameters:
        - name: customerId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Customer deleted

  /customer-auth/me:
    get:
      operationId: getCustomerAuthMe
      tags: [customerAuth]
      summary: Get the currently logged-in customer
      responses:
        "200":
          description: Current customer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "401":
          description: Not logged in

  /customer-auth/login:
    post:
      operationId: customerLogin
      tags: [customerAuth]
      summary: Log in with customer number and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerLoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "401":
          description: Invalid credentials or password not set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthError"

  /customer-auth/set-password:
    post:
      operationId: customerSetPassword
      tags: [customerAuth]
      summary: Set a password for a customer that has never logged in before
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerSetPasswordBody"
      responses:
        "200":
          description: Password set and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "400":
          description: Validation error, or email required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerAuthError"
        "404":
          description: Customer number not found

  /customer-auth/forgot-password:
    post:
      operationId: customerForgotPassword
      tags: [customerAuth]
      summary: Request a password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerForgotPasswordBody"
      responses:
        "200":
          description: Reset email sent, or email needed before it can be sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerForgotPasswordResult"
        "404":
          description: Customer number not found

  /customer-auth/reset-password:
    post:
      operationId: customerResetPassword
      tags: [customerAuth]
      summary: Reset password using a reset token from email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerResetPasswordBody"
      responses:
        "200":
          description: Password reset and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSession"
        "400":
          description: Invalid or expired reset token

  /customer-auth/logout:
    post:
      operationId: customerLogout
      tags: [customerAuth]
      summary: Log out the current customer
      responses:
        "200":
          description: Logged out

  /vendors/{vendorId}/products:
    get:
      operationId: listVendorProducts
      tags: [products]
      summary: List products for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /vendors/{vendorId}/products/{productId}:
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (name, packSize, isActive)
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List purchase orders
      parameters:
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, sent, confirmed, partial, substitution, received]
        - name: weekDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a purchase order with its line items
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or notes
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete a draft purchase order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{orderId}/items:
    get:
      operationId: listOrderItems
      tags: [orders]
      summary: List line items for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order line items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderItem"
    post:
      operationId: addOrderItem
      tags: [orders]
      summary: Add a line item to an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrderItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"

  /orders/{orderId}/items/{itemId}:
    patch:
      operationId: updateOrderItem
      tags: [orders]
      summary: Update an order line item (quantity or confirmation)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"
    delete:
      operationId: deleteOrderItem
      tags: [orders]
      summary: Remove a line item from an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{orderId}/receive:
    post:
      operationId: receiveOrder
      tags: [orders]
      summary: Receive a shipment for an order — adds to inventory
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveOrderBody"
      responses:
        "200":
          description: Receipt recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
                required: [received]

  /orders/{orderId}/confirm:
    post:
      operationId: confirmOrder
      tags: [orders]
      summary: Bulk confirm/deny items in an order (vendor response)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOrderBody"
      responses:
        "200":
          description: Confirmed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/send-email:
    post:
      operationId: sendOrderEmail
      tags: [orders]
      summary: Send PO confirmation email to vendor
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"

  /vendor-confirm/{token}:
    get:
      operationId: getOrderByToken
      tags: [vendorConfirm]
      summary: Get order details by confirmation token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order for vendor confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /vendor-confirm/{token}/confirm:
    post:
      operationId: confirmOrderByToken
      tags: [vendorConfirm]
      summary: Submit vendor confirmations via token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOrderBody"
      responses:
        "200":
          description: Confirmed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List current inventory stock levels
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Adjust inventory (sale, write-off, or manual correction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryAdjustBody"
      responses:
        "200":
          description: Adjusted item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/transactions:
    get:
      operationId: listInventoryTransactions
      tags: [inventory]
      summary: List inventory transaction history
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: orderId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryTransaction"

  /inventory/lookup:
    get:
      operationId: lookupInventoryByBarcode
      tags: [inventory]
      summary: Look up an inventory item by barcode value (product name)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [salesOrders]
      summary: List all sales orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sales orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesOrderSummary"
    post:
      operationId: createSalesOrder
      tags: [salesOrders]
      summary: Create a new sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesOrderBody"
      responses:
        "201":
          description: Created sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"

  /sales-orders/{salesOrderId}:
    get:
      operationId: getSalesOrder
      tags: [salesOrders]
      summary: Get a sales order with items
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"
    put:
      operationId: updateSalesOrder
      tags: [salesOrders]
      summary: Update a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderBody"
      responses:
        "200":
          description: Updated sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"
    delete:
      operationId: deleteSalesOrder
      tags: [salesOrders]
      summary: Delete a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales-orders/{salesOrderId}/items:
    post:
      operationId: addSalesOrderItem
      tags: [salesOrders]
      summary: Add an item to a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSalesOrderItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderLineItem"

  /sales-orders/{salesOrderId}/items/{itemId}:
    put:
      operationId: updateSalesOrderItem
      tags: [salesOrders]
      summary: Update quantity of a sales order item
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderLineItem"
    delete:
      operationId: deleteSalesOrderItem
      tags: [salesOrders]
      summary: Remove an item from a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /summary/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [summary]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /summary/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [summary]
      summary: Get recent orders across all vendors
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"

  /summary/vendor-activity:
    get:
      operationId: getVendorActivity
      tags: [summary]
      summary: Get order counts per vendor
      responses:
        "200":
          description: Vendor activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorActivity"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: App settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

components:
