          type: string
        email:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true
        sourceLocation:
          type: string
          nullable: true
        products:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              packSize:
                type: string
                nullable: true
            required: [name]
      required: [name, products]

