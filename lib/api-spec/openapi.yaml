          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true
        sourceLocation:
          type: string
          nullable: true
        priceListEmail:
          type: string
          nullable: true
          description: Email address that this vendor sends price list newsletters from
        productCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, productCount, createdAt]

    UpdateVendorBody:
      type: object
      properties:
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true
        sourceLocation:
          type: string
          nullable: true
        priceListEmail:
          type: string
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        name:
          type: string
        packSize:
          type: string
          nullable: true
        cost:
          type: string
          nullable: true
          description: Unit cost in dollars (stored as numeric string)
        isActive:
          type: boolean
        isNew:
          type: boolean
        createdAt:
          type: string
      required: [id, vendorId, name, isActive, isNew, createdAt]

    CreateVendorBody:
