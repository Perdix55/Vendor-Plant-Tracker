openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Purchase Order System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: vendors
    description: Vendor management
  - name: products
    description: Product catalog
  - name: orders
    description: Purchase orders
  - name: summary
    description: Dashboard summaries
  - name: vendorConfirm
    description: Public vendor confirmation (token-based)
  - name: settings
    description: App-wide settings
  - name: salesOrders
    description: Sales orders (customer-facing)
  - name: inventory
    description: Inventory management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /vendors:
    get:
      operationId: listVendors
      tags: [vendors]
      summary: List all vendors
      responses:
        "200":
          description: List of vendors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vendor"
    post:
      operationId: createVendor
      tags: [vendors]
      summary: Create a new vendor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVendorBody"
      responses:
        "201":
          description: Created vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/import:
    post:
      operationId: importVendor
      tags: [vendors]
      summary: Import a new vendor with products from a spreadsheet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportVendorBody"
      responses:
        "201":
          description: Imported vendor with products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportVendorResult"

  /vendors/{vendorId}:
    get:
      operationId: getVendor
      tags: [vendors]
      summary: Get a vendor by ID
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vendor details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"
    patch:
      operationId: updateVendor
      tags: [vendors]
      summary: Update vendor email or notes
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVendorBody"
      responses:
        "200":
          description: Updated vendor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vendor"

  /vendors/{vendorId}/products:
    get:
      operationId: listVendorProducts
      tags: [products]
      summary: List products for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product for a vendor
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /vendors/{vendorId}/products/{productId}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (name, packSize, isActive)
      parameters:
        - name: vendorId
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List purchase orders
      parameters:
        - name: vendorId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, sent, confirmed, partial]
        - name: weekDate
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of purchase orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new purchase order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Created order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get a purchase order with its line items
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status or notes
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Updated order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
    delete:
      operationId: deleteOrder
      tags: [orders]
      summary: Delete a draft purchase order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{orderId}/items:
    get:
      operationId: listOrderItems
      tags: [orders]
      summary: List line items for an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order line items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderItem"
    post:
      operationId: addOrderItem
      tags: [orders]
      summary: Add a line item to an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddOrderItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"

  /orders/{orderId}/items/{itemId}:
    patch:
      operationId: updateOrderItem
      tags: [orders]
      summary: Update an order line item (quantity or confirmation)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderItem"
    delete:
      operationId: deleteOrderItem
      tags: [orders]
      summary: Remove a line item from an order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders/{orderId}/receive:
    post:
      operationId: receiveOrder
      tags: [orders]
      summary: Receive a shipment for an order — adds to inventory
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveOrderBody"
      responses:
        "200":
          description: Receipt recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: integer
                required: [received]

  /orders/{orderId}/confirm:
    post:
      operationId: confirmOrder
      tags: [orders]
      summary: Bulk confirm/deny items in an order (vendor response)
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOrderBody"
      responses:
        "200":
          description: Confirmed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{orderId}/send-email:
    post:
      operationId: sendOrderEmail
      tags: [orders]
      summary: Send PO confirmation email to vendor
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Email sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendEmailResponse"

  /vendor-confirm/{token}:
    get:
      operationId: getOrderByToken
      tags: [vendorConfirm]
      summary: Get order details by confirmation token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order for vendor confirmation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /vendor-confirm/{token}/confirm:
    post:
      operationId: confirmOrderByToken
      tags: [vendorConfirm]
      summary: Submit vendor confirmations via token (public)
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmOrderBody"
      responses:
        "200":
          description: Confirmed order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /inventory:
    get:
      operationId: listInventory
      tags: [inventory]
      summary: List current inventory stock levels
      responses:
        "200":
          description: Inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Adjust inventory (sale, write-off, or manual correction)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InventoryAdjustBody"
      responses:
        "200":
          description: Adjusted item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /inventory/transactions:
    get:
      operationId: listInventoryTransactions
      tags: [inventory]
      summary: List inventory transaction history
      parameters:
        - name: productId
          in: query
          schema:
            type: integer
        - name: orderId
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryTransaction"

  /inventory/lookup:
    get:
      operationId: lookupInventoryByBarcode
      tags: [inventory]
      summary: Look up an inventory item by barcode value (product name)
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Matching inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"

  /sales-orders:
    get:
      operationId: listSalesOrders
      tags: [salesOrders]
      summary: List all sales orders
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Sales orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SalesOrderSummary"
    post:
      operationId: createSalesOrder
      tags: [salesOrders]
      summary: Create a new sales order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSalesOrderBody"
      responses:
        "201":
          description: Created sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"

  /sales-orders/{salesOrderId}:
    get:
      operationId: getSalesOrder
      tags: [salesOrders]
      summary: Get a sales order with items
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Sales order detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"
    put:
      operationId: updateSalesOrder
      tags: [salesOrders]
      summary: Update a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderBody"
      responses:
        "200":
          description: Updated sales order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderDetail"
    delete:
      operationId: deleteSalesOrder
      tags: [salesOrders]
      summary: Delete a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sales-orders/{salesOrderId}/items:
    post:
      operationId: addSalesOrderItem
      tags: [salesOrders]
      summary: Add an item to a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddSalesOrderItemBody"
      responses:
        "201":
          description: Added item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderLineItem"

  /sales-orders/{salesOrderId}/items/{itemId}:
    put:
      operationId: updateSalesOrderItem
      tags: [salesOrders]
      summary: Update quantity of a sales order item
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSalesOrderItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SalesOrderLineItem"
    delete:
      operationId: deleteSalesOrderItem
      tags: [salesOrders]
      summary: Remove an item from a sales order
      parameters:
        - name: salesOrderId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /summary/dashboard:
    get:
      operationId: getDashboardSummary
      tags: [summary]
      summary: Get dashboard stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /summary/recent-orders:
    get:
      operationId: getRecentOrders
      tags: [summary]
      summary: Get recent orders across all vendors
      responses:
        "200":
          description: Recent orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderSummary"

  /summary/vendor-activity:
    get:
      operationId: getVendorActivity
      tags: [summary]
      summary: Get order counts per vendor
      responses:
        "200":
          description: Vendor activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VendorActivity"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get app settings
      responses:
        "200":
          description: App settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update app settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppSettings"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSettings"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Vendor:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true
        productCount:
          type: integer
        createdAt:
          type: string
      required: [id, name, productCount, createdAt]

    UpdateVendorBody:
      type: object
      properties:
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true

    Product:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        name:
          type: string
        packSize:
          type: string
          nullable: true
        isActive:
          type: boolean
        isNew:
          type: boolean
        createdAt:
          type: string
      required: [id, vendorId, name, isActive, isNew, createdAt]

    CreateVendorBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
      required: [name]

    ImportVendorBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          nullable: true
        shippingDays:
          type: integer
          nullable: true
        products:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              packSize:
                type: string
                nullable: true
            required: [name]
      required: [name, products]

    ImportVendorResult:
      type: object
      properties:
        vendor:
          $ref: "#/components/schemas/Vendor"
        productsCreated:
          type: integer
      required: [vendor, productsCreated]

    ReceiveOrderBody:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              productId:
                type: integer
              quantityReceived:
                type: integer
              notes:
                type: string
                nullable: true
            required: [productId, quantityReceived]
      required: [items]

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        vendorId:
          type: integer
        productName:
          type: string
        packSize:
          type: string
          nullable: true
        vendorName:
          type: string
        quantityOnHand:
          type: integer
        updatedAt:
          type: string
      required: [id, productId, vendorId, productName, vendorName, quantityOnHand, updatedAt]

    InventoryTransaction:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        vendorId:
          type: integer
        productName:
          type: string
        vendorName:
          type: string
        orderId:
          type: integer
          nullable: true
        type:
          type: string
        quantity:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, productId, vendorId, productName, vendorName, type, quantity, createdAt]

    InventoryAdjustBody:
      type: object
      properties:
        productId:
          type: integer
        vendorId:
          type: integer
        quantity:
          type: integer
        type:
          type: string
          enum: [sale, adjustment, write_off]
        notes:
          type: string
          nullable: true
      required: [productId, vendorId, quantity, type]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        packSize:
          type: string
          nullable: true
      required: [name]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        packSize:
          type: string
          nullable: true
        isActive:
          type: boolean

    OrderSummary:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        vendorName:
          type: string
        weekDate:
          type: string
        shipDate:
          type: string
          nullable: true
        arriveDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, sent, confirmed, partial]
        totalItems:
          type: integer
        confirmedItems:
          type: integer
        totalQuantity:
          type: integer
        notes:
          type: string
          nullable: true
        emailSentAt:
          type: string
          nullable: true
        createdAt:
          type: string
      required: [id, vendorId, vendorName, weekDate, status, totalItems, confirmedItems, totalQuantity, createdAt]

    Order:
      type: object
      properties:
        id:
          type: integer
        vendorId:
          type: integer
        vendorName:
          type: string
        vendorEmail:
          type: string
          nullable: true
        weekDate:
          type: string
        shipDate:
          type: string
          nullable: true
        arriveDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted, sent, confirmed, partial]
        notes:
          type: string
          nullable: true
        emailSentAt:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
        updatedAt:
          type: string
      required: [id, vendorId, vendorName, weekDate, status, items, createdAt, updatedAt]

    OrderItem:
      type: object
      properties:
        id:
          type: integer
        orderId:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        packSize:
          type: string
          nullable: true
        quantityOrdered:
          type: integer
        quantityConfirmed:
          type: integer
          nullable: true
        availability:
          type: string
          enum: [pending, available, unavailable, partial]
          nullable: true
        notes:
          type: string
          nullable: true
      required: [id, orderId, productId, productName, quantityOrdered]

    CreateOrderBody:
      type: object
      properties:
        vendorId:
          type: integer
        weekDate:
          type: string
        shipDate:
          type: string
          nullable: true
        arriveDate:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/AddOrderItemBody"
      required: [vendorId, weekDate, items]

    UpdateOrderBody:
      type: object
      properties:
        status:
          type: string
          enum: [draft, submitted, sent, confirmed, partial]
        notes:
          type: string
          nullable: true
        shipDate:
          type: string
          nullable: true
        arriveDate:
          type: string
          nullable: true

    AddOrderItemBody:
      type: object
      properties:
        productId:
          type: integer
        quantityOrdered:
          type: integer
      required: [productId, quantityOrdered]

    UpdateOrderItemBody:
      type: object
      properties:
        quantityOrdered:
          type: integer
        quantityConfirmed:
          type: integer
          nullable: true
        availability:
          type: string
          enum: [pending, available, unavailable, partial]
          nullable: true
        notes:
          type: string
          nullable: true

    ConfirmOrderBody:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              itemId:
                type: integer
              availability:
                type: string
                enum: [available, unavailable, partial]
              quantityConfirmed:
                type: integer
                nullable: true
              notes:
                type: string
                nullable: true
            required: [itemId, availability]
      required: [items]

    SendEmailResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        emailSentAt:
          type: string
      required: [success, message]

    DashboardSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        draftOrders:
          type: integer
        sentOrders:
          type: integer
        confirmedOrders:
          type: integer
        partialOrders:
          type: integer
        totalVendors:
          type: integer
        currentWeekOrders:
          type: integer
        upcomingWeeks:
          type: integer
      required: [totalOrders, draftOrders, sentOrders, confirmedOrders, partialOrders, totalVendors, currentWeekOrders, upcomingWeeks]

    VendorActivity:
      type: object
      properties:
        vendorId:
          type: integer
        vendorName:
          type: string
        totalOrders:
          type: integer
        lastOrderDate:
          type: string
          nullable: true
      required: [vendorId, vendorName, totalOrders]

    AppSettings:
      type: object
      properties:
        fromEmail:
          type: string
          nullable: true

    SalesOrderLineItem:
      type: object
      required: [id, salesOrderId, inventoryItemId, productId, vendorId, productName, vendorName, quantity, createdAt]
      properties:
        id:
          type: integer
        salesOrderId:
          type: integer
        inventoryItemId:
          type: integer
        productId:
          type: integer
        vendorId:
          type: integer
        productName:
          type: string
        vendorName:
          type: string
        packSize:
          type: string
          nullable: true
        quantity:
          type: integer
        createdAt:
          type: string

    SalesOrderSummary:
      type: object
      required: [id, customerName, status, createdAt, updatedAt, itemCount]
      properties:
        id:
          type: integer
        customerName:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        itemCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string

    SalesOrderDetail:
      type: object
      required: [id, customerName, status, createdAt, updatedAt, items]
      properties:
        id:
          type: integer
        customerName:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
        updatedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SalesOrderLineItem"

    CreateSalesOrderBody:
      type: object
      required: [customerName]
      properties:
        customerName:
          type: string
        notes:
          type: string
          nullable: true

    UpdateSalesOrderBody:
      type: object
      properties:
        customerName:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true

    AddSalesOrderItemBody:
      type: object
      required: [inventoryItemId]
      properties:
        inventoryItemId:
          type: integer
        quantity:
          type: integer

    UpdateSalesOrderItemBody:
      type: object
      required: [quantity]
      properties:
        quantity:
          type: integer
