kind = "web"
previewPath = "/"
title = "Purchase Order System"
version = "1.0.0"
id = "artifacts/po-system"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22387

[services.development]
run = "pnpm --filter @workspace/po-system run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/po-system", "run", "build" ]
publicDir = "artifacts/po-system/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22387"
BASE_PATH = "/"
